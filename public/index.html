<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFK Bot — DonutSMP</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0c10;--surface:#11141c;--surface2:#181c27;--border:#222736;
    --green:#00ff87;--blue:#4fc3f7;--orange:#ffab40;--red:#ff6b6b;--purple:#c084fc;
    --text:#dde4f0;--muted:#5a6380;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh}

  header{
    padding:18px 24px;border-bottom:1px solid var(--border);
    background:var(--surface);display:flex;align-items:center;
    justify-content:space-between;flex-wrap:wrap;gap:12px;
  }
  .logo{font-size:17px;font-weight:800;display:flex;align-items:center;gap:8px}
  .logo span{color:var(--green)}
  .add-btn{
    display:flex;align-items:center;gap:6px;
    background:var(--green);color:#0a0c10;border:none;
    padding:8px 18px;border-radius:8px;font-family:'Syne',sans-serif;
    font-weight:700;font-size:13px;cursor:pointer;transition:all 0.2s;
  }
  .add-btn:hover{background:#00e077;box-shadow:0 0 16px rgba(0,255,135,0.3)}

  main{max-width:960px;margin:0 auto;padding:24px 16px}

  .empty-state{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
  .empty-state .big{font-size:48px;margin-bottom:16px}
  .empty-state p{margin-bottom:20px}

  .bots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}

  .bot-card{
    background:var(--surface);border:1px solid var(--border);
    border-radius:16px;overflow:hidden;transition:border-color 0.3s;
  }
  .bot-card.connected{border-color:rgba(0,255,135,0.25)}
  .bot-card.disconnected{border-color:rgba(255,107,107,0.2)}
  .bot-card.connecting{border-color:rgba(255,171,64,0.2)}

  .card-head{
    display:flex;align-items:center;gap:12px;
    padding:14px 16px 12px;border-bottom:1px solid var(--border);
    background:var(--surface2);
  }
  .avatar{
    width:36px;height:36px;border-radius:9px;
    background:var(--surface);border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;
  }
  .card-name{font-size:14px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card-status{
    display:flex;align-items:center;gap:5px;
    font-family:'JetBrains Mono',monospace;font-size:10px;
    padding:3px 9px;border-radius:10px;border:1px solid var(--border);
    background:var(--surface);flex-shrink:0;
  }
  .sdot{width:6px;height:6px;border-radius:50%;background:var(--muted)}
  .sdot.connected{background:var(--green);animation:pulse 2s infinite}
  .sdot.connecting{background:var(--orange);animation:pulse 1s infinite}
  .sdot.disconnected{background:var(--red)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

  .card-body{padding:14px 16px}

  /* Mini logs */
  .mini-logs{
    background:#060810;border:1px solid var(--border);border-radius:8px;
    height:90px;overflow-y:auto;padding:8px 10px;
    font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.7;
    margin-bottom:12px;
  }
  .mini-logs::-webkit-scrollbar{width:3px}
  .mini-logs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  .log-ok{color:var(--green)} .log-err{color:var(--red)}
  .log-warn{color:var(--orange)} .log-time{color:var(--text)}
  .log-home{color:var(--purple)} .log-def{color:var(--muted)}

  /* Section commandes */
  .cmd-section{margin-bottom:12px}
  .cmd-label{
    font-family:'JetBrains Mono',monospace;font-size:10px;
    color:var(--muted);letter-spacing:1px;text-transform:uppercase;
    margin-bottom:7px;
  }
  .cmd-row{display:flex;gap:7px;flex-wrap:wrap}

  /* Boutons commande */
  .cbtn{
    padding:8px 14px;border-radius:8px;border:none;
    font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;
    cursor:pointer;transition:all 0.2s;
  }
  .cbtn:active{transform:scale(0.96)}
  .cbtn:disabled{opacity:0.35;cursor:not-allowed;transform:none}

  .cbtn.home1{background:rgba(192,132,252,0.15);border:1px solid rgba(192,132,252,0.35);color:var(--purple)}
  .cbtn.home1:not(:disabled):hover{background:rgba(192,132,252,0.25)}
  .cbtn.home2{background:rgba(192,132,252,0.15);border:1px solid rgba(192,132,252,0.35);color:var(--purple)}
  .cbtn.home2:not(:disabled):hover{background:rgba(192,132,252,0.25)}
  .cbtn.afk{
    background:rgba(0,255,135,0.1);border:1px solid rgba(0,255,135,0.3);color:var(--green);
    display:flex;align-items:center;gap:6px;
  }
  .cbtn.afk:not(:disabled):hover{background:rgba(0,255,135,0.2)}

  /* Boutons contrôle */
  .ctrl-row{display:flex;gap:8px;margin-top:12px}
  .ctrl-btn{
    flex:1;padding:8px 0;border-radius:8px;border:none;
    font-family:'Syne',sans-serif;font-weight:700;font-size:12px;
    cursor:pointer;transition:all 0.2s;
  }
  .ctrl-btn:active{transform:scale(0.97)}
  .ctrl-btn.start{background:var(--green);color:#0a0c10}
  .ctrl-btn.start:not(:disabled):hover{background:#00e077}
  .ctrl-btn.start:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}
  .ctrl-btn.stop{background:transparent;border:1px solid var(--red);color:var(--red)}
  .ctrl-btn.stop:not(:disabled):hover{background:rgba(255,107,107,0.1)}
  .ctrl-btn.stop:disabled{border-color:var(--border);color:var(--muted);cursor:not-allowed}
  .ctrl-btn.auth{background:transparent;border:1px solid var(--blue);color:var(--blue);flex:0;padding:8px 12px}
  .ctrl-btn.auth:hover{background:rgba(79,195,247,0.1)}
  .ctrl-btn.del{background:transparent;border:1px solid var(--border);color:var(--muted);flex:0;padding:8px 12px}
  .ctrl-btn.del:hover{border-color:var(--red);color:var(--red)}

  /* Badge AFK en cours */
  .afk-badge{
    display:inline-flex;align-items:center;gap:5px;
    background:rgba(0,255,135,0.1);border:1px solid rgba(0,255,135,0.25);
    color:var(--green);font-family:'JetBrains Mono',monospace;font-size:10px;
    padding:3px 8px;border-radius:6px;margin-left:6px;
  }
  .spin{display:inline-block;animation:spin 0.9s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Modal */
  .modal-bg{
    position:fixed;inset:0;background:rgba(0,0,0,0.75);
    display:flex;align-items:center;justify-content:center;
    z-index:100;padding:16px;opacity:0;pointer-events:none;transition:opacity 0.2s;
  }
  .modal-bg.open{opacity:1;pointer-events:all}
  .modal{
    background:var(--surface);border:1px solid var(--border);
    border-radius:20px;padding:28px;width:100%;max-width:400px;
  }
  .modal h3{font-size:18px;font-weight:800;margin-bottom:6px}
  .modal p{font-size:13px;color:var(--muted);margin-bottom:20px}
  .modal input{
    width:100%;background:var(--surface2);border:1px solid var(--border);
    border-radius:10px;padding:11px 14px;color:var(--text);
    font-family:'Syne',sans-serif;font-size:14px;margin-bottom:12px;outline:none;
  }
  .modal input:focus{border-color:rgba(0,255,135,0.4)}
  .modal-btns{display:flex;gap:10px;margin-top:4px}
  .mbtn{
    flex:1;padding:11px 0;border-radius:10px;border:none;
    font-family:'Syne',sans-serif;font-weight:700;font-size:14px;cursor:pointer;
  }
  .mbtn.confirm{background:var(--green);color:#0a0c10}
  .mbtn.confirm:hover{background:#00e077}
  .mbtn.cancel{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}

  /* Auth modal */
  .auth-code-box{
    background:#060810;border:1px solid rgba(79,195,247,0.3);
    border-radius:12px;padding:20px;text-align:center;margin:16px 0;
  }
  .auth-code{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;color:var(--blue);letter-spacing:4px;margin:8px 0}
  .auth-link{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace}
  .auth-link a{color:var(--blue);text-decoration:none}
  .auth-link a:hover{text-decoration:underline}
  .countdown{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--orange);margin-top:8px}
  .auth-success{background:rgba(0,255,135,0.08);border:1px solid rgba(0,255,135,0.3);border-radius:12px;padding:20px;text-align:center;color:var(--green);font-weight:700;font-size:16px}
  .auth-expired{background:rgba(255,107,107,0.08);border:1px solid rgba(255,107,107,0.3);border-radius:12px;padding:16px;text-align:center;color:var(--red);font-size:13px}
  .spinner{display:inline-block;width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:5px;vertical-align:middle}
</style>
</head>
<body>

<header>
  <div class="logo">⛏️ AFK Bot <span>DonutSMP</span></div>
  <button class="add-btn" onclick="openAddModal()">+ Ajouter un compte</button>
</header>

<main>
  <div id="emptyState" class="empty-state" style="display:none">
    <div class="big">🤖</div>
    <p>Aucun compte configuré.<br>Ajoute ton premier compte pour commencer !</p>
    <button class="add-btn" style="margin:0 auto" onclick="openAddModal()">+ Ajouter un compte</button>
  </div>
  <div class="bots-grid" id="botsGrid"></div>
</main>

<!-- Modal ajout -->
<div class="modal-bg" id="addModal">
  <div class="modal">
    <h3>Ajouter un compte</h3>
    <p>Entre un identifiant unique et un nom affiché pour ce compte.</p>
    <input type="text" id="addId" placeholder="Identifiant (ex: compte1)" maxlength="20">
    <input type="text" id="addName" placeholder="Nom affiché (ex: MonPseudo)" maxlength="30">
    <div class="modal-btns">
      <button class="mbtn cancel" onclick="closeAddModal()">Annuler</button>
      <button class="mbtn confirm" onclick="confirmAdd()">Ajouter</button>
    </div>
  </div>
</div>

<!-- Modal auth -->
<div class="modal-bg" id="authModal">
  <div class="modal">
    <h3>🔑 Connexion Microsoft</h3>
    <p id="authModalSub">Connecte ton compte Minecraft.</p>
    <div id="authModalContent">
      <div style="text-align:center;padding:20px;color:var(--muted)"><span class="spinner"></span> Chargement...</div>
    </div>
    <div class="modal-btns" style="margin-top:16px">
      <button class="mbtn cancel" onclick="closeAuthModal()">Fermer</button>
      <button class="mbtn confirm" id="authRetryBtn" style="display:none" onclick="retryAuth()">Réessayer</button>
    </div>
  </div>
</div>

<script>
  let bots = []
  let authPollInterval = null
  let countdownInterval = null
  let currentAuthId = null

  async function fetchBots() {
    try {
      const r = await fetch('/api/bots')
      bots = await r.json()
      renderBots()
    } catch {}
  }

  function renderBots() {
    const grid = document.getElementById('botsGrid')
    const empty = document.getElementById('emptyState')
    if (bots.length === 0) { empty.style.display='block'; grid.innerHTML=''; return }
    empty.style.display = 'none'
    const isSearching = (b) => b.afkStatus === 'searching'

    grid.innerHTML = bots.map(b => {
      const dis = b.status !== 'connected'
      return `
      <div class="bot-card ${b.status}">
        <div class="card-head">
          <div class="avatar">${avatar(b.status)}</div>
          <div class="card-name">${esc(b.name)}${isSearching(b) ? '<span class="afk-badge"><span class="spin">⟳</span> Recherche AFK...</span>' : ''}</div>
          <div class="card-status"><div class="sdot ${b.status}"></div>${statusLabel(b.status)}</div>
        </div>
        <div class="card-body">
          <div class="mini-logs" id="logs-${b.id}">${renderLogs(b.logs)}</div>

          <div class="cmd-section">
            <div class="cmd-label">Téléportation</div>
            <div class="cmd-row">
              <button class="cbtn home1" ${dis?'disabled':''} onclick="goHome('${b.id}',1)">/home 1</button>
              <button class="cbtn home2" ${dis?'disabled':''} onclick="goHome('${b.id}',2)">/home 2</button>
            </div>
          </div>

          <div class="cmd-section">
            <div class="cmd-label">AFK Auto</div>
            <div class="cmd-row">
              <button class="cbtn afk" ${dis||isSearching(b)?'disabled':''} onclick="findAfk('${b.id}')">
                ${isSearching(b) ? '<span class="spin">⟳</span> Recherche...' : '🔍 Trouver un AFK libre'}
              </button>
            </div>
          </div>

          <div class="ctrl-row">
            <button class="ctrl-btn start" ${b.status==='connected'||b.status==='connecting'?'disabled':''} onclick="startBot('${b.id}')">▶ Start</button>
            <button class="ctrl-btn stop" ${b.status==='stopped'?'disabled':''} onclick="stopBot('${b.id}')">■ Stop</button>
            <button class="ctrl-btn auth" onclick="openAuthModal('${b.id}','${esc(b.name)}')">🔑</button>
            <button class="ctrl-btn del" onclick="deleteBot('${b.id}')">🗑</button>
          </div>
        </div>
      </div>`
    }).join('')

    bots.forEach(b => {
      const el = document.getElementById(`logs-${b.id}`)
      if (el) el.scrollTop = el.scrollHeight
    })
  }

  function renderLogs(logs) {
    if (!logs || logs.length === 0) return '<span style="color:var(--muted)">Aucun log...</span>'
    return logs.slice(-20).map(l => `<div class="${logClass(l)}">${esc(l)}</div>`).join('')
  }

  function logClass(l) {
    if (l.includes('✅')) return 'log-ok'
    if (l.includes('❌')||l.includes('⚠️')) return 'log-err'
    if (l.includes('🔄')||l.includes('⛔')) return 'log-warn'
    if (l.includes('⏰')) return 'log-time'
    if (l.includes('🏠')||l.includes('🔍')) return 'log-home'
    return 'log-def'
  }

  function statusLabel(s) {
    return {connected:'Connecté',connecting:'Connexion...',disconnected:'Déconnecté',stopped:'Arrêté'}[s]||s
  }

  function avatar(s) {
    return {connected:'🤖',connecting:'🔄',disconnected:'❌',stopped:'😴'}[s]||'🤖'
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }

  async function startBot(id) { await fetch(`/api/bots/${id}/start`,{method:'POST'}) }
  async function stopBot(id) { await fetch(`/api/bots/${id}/stop`,{method:'POST'}) }
  async function goHome(id, num) { await fetch(`/api/bots/${id}/home/${num}`,{method:'POST'}) }
  async function findAfk(id) { await fetch(`/api/bots/${id}/findafk`,{method:'POST'}) }

  async function deleteBot(id) {
    if (!confirm('Supprimer ce compte ?')) return
    await fetch(`/api/bots/${id}`,{method:'DELETE'})
    await fetchBots()
  }

  function openAddModal() { document.getElementById('addModal').classList.add('open'); document.getElementById('addId').focus() }
  function closeAddModal() {
    document.getElementById('addModal').classList.remove('open')
    document.getElementById('addId').value=''
    document.getElementById('addName').value=''
  }

  async function confirmAdd() {
    const id = document.getElementById('addId').value.trim().replace(/\s+/g,'_')
    const name = document.getElementById('addName').value.trim()
    if (!id||!name) return alert('Remplis les deux champs.')
    await fetch('/api/bots',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,name})})
    closeAddModal()
    await fetchBots()
  }

  function openAuthModal(id, name) {
    currentAuthId = id
    document.getElementById('authModalSub').textContent = `Compte : ${name}`
    document.getElementById('authModal').classList.add('open')
    document.getElementById('authRetryBtn').style.display = 'none'
    startAuthFlow(id)
  }

  function closeAuthModal() {
    document.getElementById('authModal').classList.remove('open')
    if (authPollInterval) { clearInterval(authPollInterval); authPollInterval=null }
    if (countdownInterval) { clearInterval(countdownInterval); countdownInterval=null }
    if (currentAuthId) fetch(`/api/bots/${currentAuthId}/auth/cancel`,{method:'POST'})
    currentAuthId = null
  }

  async function startAuthFlow(id) {
    setAuthContent(`<div style="text-align:center;padding:20px;color:var(--muted)"><span class="spinner"></span> Connexion à Microsoft...</div>`)
    document.getElementById('authRetryBtn').style.display = 'none'
    try {
      const r = await fetch(`/api/bots/${id}/auth/start`,{method:'POST'})
      const data = await r.json()
      if (data.error) throw new Error(data.error)
      let secondsLeft = data.expiresIn || 900

      setAuthContent(`
        <div class="auth-code-box">
          <div style="font-size:12px;color:var(--muted);margin-bottom:4px">Va sur ce site depuis ton PC :</div>
          <div class="auth-link"><a href="${data.link}" target="_blank">${data.link}</a></div>
          <div style="font-size:12px;color:var(--muted);margin:12px 0 4px">Entre ce code :</div>
          <div class="auth-code">${data.code}</div>
          <div class="countdown" id="authCountdown">⏱ ${fmt(secondsLeft)}</div>
        </div>
        <div style="font-size:12px;color:var(--muted);text-align:center"><span class="spinner"></span> En attente de validation...</div>
      `)

      countdownInterval = setInterval(() => {
        secondsLeft--
        const el = document.getElementById('authCountdown')
        if (el) el.textContent = `⏱ ${fmt(secondsLeft)}`
        if (secondsLeft <= 0) { clearInterval(countdownInterval); countdownInterval=null }
      }, 1000)

      authPollInterval = setInterval(async () => {
        try {
          const sr = await fetch(`/api/bots/${id}/auth/status`)
          const s = await sr.json()
          if (s.status === 'success') {
            clearInterval(authPollInterval); authPollInterval=null
            clearInterval(countdownInterval); countdownInterval=null
            setAuthContent(`<div class="auth-success">✅ Compte connecté !<br><span style="font-size:13px;font-weight:400;color:var(--muted)">Tu peux maintenant démarrer le bot.</span></div>`)
          } else if (s.status === 'expired') {
            clearInterval(authPollInterval); authPollInterval=null
            clearInterval(countdownInterval); countdownInterval=null
            setAuthContent(`<div class="auth-expired">❌ Code expiré. Clique sur Réessayer.</div>`)
            document.getElementById('authRetryBtn').style.display = 'block'
          }
        } catch {}
      }, 3000)
    } catch(err) {
      setAuthContent(`<div class="auth-expired">❌ Erreur : ${err.message}</div>`)
      document.getElementById('authRetryBtn').style.display = 'block'
    }
  }

  function retryAuth() { if (currentAuthId) startAuthFlow(currentAuthId) }
  function setAuthContent(html) { document.getElementById('authModalContent').innerHTML = html }
  function fmt(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}` }

  setInterval(fetchBots, 3000)
  fetchBots()

  document.getElementById('addModal').addEventListener('click', e => { if(e.target===e.currentTarget) closeAddModal() })
  document.getElementById('authModal').addEventListener('click', e => { if(e.target===e.currentTarget) closeAuthModal() })
  document.getElementById('addName').addEventListener('keydown', e => { if(e.key==='Enter') confirmAdd() })
</script>
</body>
</html>
