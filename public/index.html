<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFK Bot — DonutSMP</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0c10;--surface:#11141c;--surface2:#181c27;--border:#222736;
    --green:#00ff87;--blue:#4fc3f7;--orange:#ffab40;--red:#ff6b6b;--purple:#c084fc;
    --text:#dde4f0;--muted:#5a6380;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh}

  header{
    padding:18px 24px;border-bottom:1px solid var(--border);
    background:var(--surface);display:flex;align-items:center;
    justify-content:space-between;flex-wrap:wrap;gap:12px;
  }
  .logo{font-size:17px;font-weight:800;letter-spacing:-0.5px;display:flex;align-items:center;gap:8px}
  .logo span{color:var(--purple)}

  main{padding:24px;max-width:1200px;margin:0 auto}
  .top-bar{display:flex;justify-content:between;align-items:center;margin-bottom:24px}
  h2{font-size:22px;font-weight:700}

  button{
    background:var(--surface2);color:var(--text);border:1px solid var(--border);
    padding:10px 16px;border-radius:8px;font-weight:700;font-family:inherit;
    cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:0.2s;
  }
  button:hover{background:var(--border)}
  button.primary{background:var(--purple);color:#000;border-color:transparent}
  button.primary:hover{opacity:0.9}

  .grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(360px, 1fr));gap:20px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:16px}
  .card-header{display:flex;justify-content:between;align-items:center;justify-content:space-between}
  .bot-info{display:flex;flex-direction:column;gap:4px}
  .bot-name{font-weight:700;font-size:18px}
  .bot-id{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted)}

  .status{font-size:12px;font-weight:700;padding:4px 8px;border-radius:6px;text-transform:uppercase}
  .status.stopped{background:rgba(255,107,107,0.1);color:var(--red)}
  .status.connected{background:rgba(0,255,135,0.1);color:var(--green)}
  .status.connecting{background:rgba(255,171,64,0.1);color:var(--orange)}

  .actions{display:flex;gap:8px;flex-wrap:wrap}
  .actions button{padding:8px 12px;font-size:13px}
  button.danger{color:var(--red)}
  button.danger:hover{background:rgba(255,107,107,0.1)}

  .console{
    background:#07080c;border:1px solid var(--border);border-radius:8px;
    padding:12px;font-family:'JetBrains Mono',monospace;font-size:12px;
    height:180px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;
    color:#a3b3cc;box-shadow:inset 0 4px 12px rgba(0,0,0,0.5);
  }

  .modal-overlay{
    position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);
    backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;
    opacity:0;pointer-events:none;transition:0.2s;z-index:100;
  }
  .modal-overlay.open{opacity:1;pointer-events:auto}
  .modal{
    background:var(--surface);border:1px solid var(--border);border-radius:16px;
    padding:24px;width:100%;max-width:420px;box-shadow:0 20px 40px rgba(0,0,0,0.5);
    display:flex;flex-direction:column;gap:18px;
  }
  .modal h3{font-size:18px;font-weight:700}
  .form-group{display:flex;flex-direction:column;gap:8px}
  .form-group label{font-size:13px;color:var(--muted);font-weight:700}
  input{
    background:var(--surface2);border:1px solid var(--border);padding:12px;
    border-radius:8px;color:var(--text);font-family:inherit;font-size:14px;
  }
  input:focus{outline:none;border-color:var(--purple)}

  .auth-loading { display:flex; flex-direction:column; align-items:center; gap:12px; color:var(--orange); font-weight:700; text-align:center; padding:10px 0; }
  .auth-code-box{background:var(--surface2);border:1px solid var(--border);padding:16px;border-radius:8px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;color:var(--blue);letter-spacing:2px;margin:10px 0}
  .auth-link{color:var(--purple);font-weight:700;text-decoration:none;border-bottom:1px dashed var(--purple)}
  .auth-success{color:var(--green);font-weight:700;text-align:center;padding:10px 0}
  .auth-expired{color:var(--red);font-weight:700;text-align:center;padding:10px 0}
</style>
</head>
<body>

<header>
  <div class="logo">🍩 DONUTSMP <span>AFK BOT v2.0</span></div>
  <button class="primary" onclick="openAddModal()">➕ Ajouter un compte</button>
</header>

<main>
  <div class="grid" id="botsGrid"></div>
</main>

<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3>Nouveau Compte</h3>
    <div class="form-group">
      <label>ID Unique (sans espace, minuscules)</label>
      <input type="text" id="accId" placeholder="ex: farm1">
    </div>
    <div class="form-group">
      <label>Pseudo Minecraft</label>
      <input type="text" id="accName" placeholder="ex: Player33">
    </div>
    <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:10px">
      <button onclick="closeAddModal()">Annuler</button>
      <button class="primary" onclick="submitAccount()">Enregistrer</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="authModal">
  <div class="modal">
    <h3>Authentification Microsoft</h3>
    <div id="authModalContent">
      </div>
    <button id="authRetryBtn" class="primary" style="display:none;width:100%;justify-content:center" onclick="retryAuth()">🔄 Réessayer</button>
    <button style="width:100%;justify-content:center" onclick="closeAuthModal()">Fermer</button>
  </div>
</div>

<script>
  let authPollInterval = null;
  let countdownInterval = null;
  let currentAuthId = null;

  async function fetchBots() {
    try {
      const res = await fetch('/api/bots')
      const data = await res.json()
      const grid = document.getElementById('botsGrid')
      
      if(data.length === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:40px">Aucun compte configuré. Clique sur "Ajouter un compte" en haut à droite.</div>`
        return
      }

      grid.innerHTML = data.map(b => {
        const isConnected = b.status === 'connected';
        return `
          <div class="card">
            <div class="card-header">
              <div class="bot-info">
                <div class="bot-name">${b.name}</div>
                <div class="bot-id">ID: ${b.id}</div>
              </div>
              <span class="status ${b.status}">${b.status === 'connected' ? 'En ligne' : b.status === 'connecting' ? 'Connexion...' : 'Arrêté'}</span>
            </div>
            
            <div class="actions">
              ${b.status === 'stopped' 
                ? `<button class="primary" onclick="startBot('${b.id}')">▶ Start</button>`
                : `<button onclick="stopBot('${b.id}')">🛑 Stop</button>`
              }
              <button onclick="startAuthFlow('${b.id}')">🔑 Auth Microsoft</button>
              <button class="danger" style="margin-left:auto" onclick="deleteAccount('${b.id}')">🗑️</button>
            </div>

            ${isConnected ? `
              <div class="actions" style="border-top: 1px solid var(--border); padding-top: 12px;">
                <button onclick="sendHome('${b.id}', 1)">🏠 Home 1</button>
                <button onclick="sendHome('${b.id}', 2)">🏠 Home 2</button>
                <button class="primary" style="background:var(--blue);color:#000" onclick="findAfk('${b.id}')">🔄 Find AFK</button>
              </div>
            ` : ''}

            <div class="console" id="console-${b.id}">
              ${b.logs.map(l => `<div>${l}</div>`).join('') || '<div style="color:var(--muted)">Aucun log...</div>'}
            </div>
          </div>
        `
      }).join('')

      // Auto-scroll des consoles
      data.forEach(b => {
        const el = document.getElementById(`console-${b.id}`)
        if(el) el.scrollTop = el.scrollHeight
      })
    } catch(err) { console.error(err) }
  }

  function openAddModal() { document.getElementById('addModal').classList.add('open') }
  function closeAddModal() { document.getElementById('addModal').classList.remove('open') }

  async function submitAccount() {
    const id = document.getElementById('accId').value.trim().toLowerCase()
    const name = document.getElementById('accName').value.trim()
    if(!id || !name) return alert('Remplis tous les champs !')
    
    try {
      await fetch('/api/bots', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({id, name})
      })
      closeAddModal()
      document.getElementById('accId').value = ''
      document.getElementById('accName').value = ''
      fetchBots()
    } catch(err) { alert(err.message) }
  }

  async function deleteAccount(id) {
    if(!confirm('Supprimer ce compte ?')) return
    await fetch(`/api/bots/${id}`, { method: 'DELETE' })
    fetchBots()
  }

  async function startBot(id) { await fetch(`/api/bots/${id}/start`, { method: 'POST' }); fetchBots() }
  async function stopBot(id) { await fetch(`/api/bots/${id}/stop`, { method: 'POST' }); fetchBots() }
  async function sendHome(id, num) { await fetch(`/api/bots/${id}/home/${num}`, { method: 'POST' }) }
  async function findAfk(id) { await fetch(`/api/bots/${id}/findafk`, { method: 'POST' }) }

  function closeAuthModal() {
    document.getElementById('authModal').classList.remove('open')
    clearInterval(authPollInterval)
    clearInterval(countdownInterval)
  }

  // --- FIX APPORTÉ ICI : FLUX D'AUTHENTIFICATION ULTRA SÉCURISÉ ET RÉSILIENT ---
  async function startAuthFlow(id) {
    currentAuthId = id
    document.getElementById('authRetryBtn').style.display = 'none'
    setAuthContent(`<div class="auth-loading">⏳ Contact des serveurs Microsoft en cours...</div>`)
    document.getElementById('authModal').classList.add('open')

    try {
      // 1. Lance la demande d'auth au manager
      const res = await fetch(`/api/bots/${id}/auth/start`, { method: 'POST' })
      const data = await res.json()

      if (data.error) {
        throw new Error(data.error)
      }

      // 2. Si le code est généré, on l'affiche proprement
      renderAuthInstructions(data.code, data.link, data.expiresIn)
      
      // 3. Boucle de vérification du statut
      startPollingAuth(id)

    } catch(err) {
      // En cas de micro-coupure, on donne une chance à l'utilisateur de vérifier le statut réel
      setAuthContent(`
        <div class="auth-expired">
          ⚠️ Statut d'authentification incertain.<br>
          <span style="font-size:12px;color:var(--muted);font-weight:400">Si un code s'affiche dans les logs Railway, utilise-le. Sinon, clique sur Réessayer.</span>
        </div>
      `)
      document.getElementById('authRetryBtn').style.display = 'block'
      // On lance quand même le polling au cas où le serveur a réussi en arrière-plan !
      startPollingAuth(id)
    }
  }

  function renderAuthInstructions(code, link, expiresIn) {
    let timeLeft = expiresIn || 900
    setAuthContent(`
      <p style="font-size:14px;line-height:1.5;margin-bottom:10px">
        1. Ouvre le lien officiel Microsoft ci-dessous :<br>
        👉 <a href="${link}" target="_blank" class="auth-link">${link}</a>
      </p>
      <p style="font-size:14px;line-height:1.5">2. Saisis le code de sécurité suivant :</p>
      <div class="auth-code-box">${code || 'CRÉATION...'}</div>
      <p style="font-size:12px;color:var(--muted);text-align:center" id="authTimer">
        Temps restant : ${fmt(timeLeft)}
      </p>
    `)

    clearInterval(countdownInterval)
    countdownInterval = setInterval(() => {
      timeLeft--
      const timerEl = document.getElementById('authTimer')
      if (timerEl) timerEl.innerText = `Temps restant : ${fmt(timeLeft)}`
      if (timeLeft <= 0) clearInterval(countdownInterval)
    }, 1000)
  }

  function startPollingAuth(id) {
    clearInterval(authPollInterval)
    authPollInterval = setInterval(async () => {
      try {
        const check = await fetch(`/api/bots/${id}/auth/status`)
        const s = await check.json()

        // Si le serveur a déjà un code mais que l'écran affichait l'erreur d'attente
        if (s.status === 'pending' && document.querySelector('.auth-loading')) {
          renderAuthInstructions(s.code, s.link, s.secondsLeft)
        }

        if (s.status === 'success') {
          clearInterval(authPollInterval); authPollInterval = null
          clearInterval(countdownInterval); countdownInterval = null
          setAuthContent(`<div class="auth-success">✅ Compte connecté avec succès !<br><span style="font-size:13px;font-weight:400;color:var(--muted)">Le fichier session a été enregistré. Tu peux fermer cette fenêtre.</span></div>`)
          fetchBots()
        } else if (s.status === 'expired') {
          clearInterval(authPollInterval); authPollInterval = null
          clearInterval(countdownInterval); countdownInterval = null
          setAuthContent(`<div class="auth-expired">❌ Session d'authentification expirée.</div>`)
          document.getElementById('authRetryBtn').style.display = 'block'
        }
      } catch {}
    }, 3000)
  }

  function retryAuth() { if (currentAuthId) startAuthFlow(currentAuthId) }
  function setAuthContent(html) { document.getElementById('authModalContent').innerHTML = html }
  function fmt(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}` }

  // Rafraîchissement des logs et statuts toutes les 3 secondes
  setInterval(fetchBots, 3000)
  fetchBots()

  document.getElementById('addModal').addEventListener('click', e => { if(e.target===e.currentTarget) closeAddModal() })
  document.getElementById('authModal').addEventListener('click', e => { if(e.target===e.currentTarget) closeAuthModal() })
</script>
</body>
</html>
